name: Check Release Notes

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-release-notes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Collect PR metadata
        id: pr-metadata
        uses: actions/github-script@v7
        with:
          script: |
            const skipFiles = new Set([
              'release-notes/README.md',
              'release-notes/TEMPLATE.md'
            ]);

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              }
            );

            const releaseNoteFiles = files
              .map(file => file.filename)
              .filter(name => name.startsWith('release-notes/'))
              .filter(name => name.endsWith('.md'))
              .filter(name => !skipFiles.has(name));

            const labels = (context.payload.pull_request.labels || [])
              .map(label => label.name);

            core.setOutput('release_note_files', releaseNoteFiles.join('\n'));
            core.setOutput('labels', labels.join('\n'));

      - name: Validate release notes
        env:
          PR_LABELS: ${{ steps.pr-metadata.outputs.labels }}
          RELEASE_NOTE_FILES: ${{ steps.pr-metadata.outputs.release_note_files }}
          SKIP_RELEASE_NOTES_LABEL: skip-release-notes
        run: ./.github/scripts/check-release-notes.sh
